name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync (dev)
        run: uv sync --extra dev
      - name: Ruff lint (includes import sorting)
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync (dev)
        run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov=driftset --cov-report=term-missing --cov-fail-under=85

  docs-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject over-claiming marketing phrases in README
        run: |
          if grep -RniE 'fully automatic|cure-all|永続|完全自動' README.md; then
            echo "::error::Over-claiming phrase found in README.md"
            exit 1
          fi
          echo "README marketing-phrase guard passed."
